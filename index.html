<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VertexViz Portfolio - Standalone</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (v3 CDN, v4 is build-only/experimental browser script) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#020617',
                        brand: '#3b82f6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    
    <style>
        @layer base {
            body {
                @apply bg-slate-950 text-slate-100 antialiased selection:bg-blue-500/30;
                margin: 0;
            }
        }
        
        .text-gradient {
            background: linear-gradient(to right, #60a5fa, #67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass {
            backdrop-filter: blur(12px);
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(30, 41, 59, 0.5);
        }

        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            border-color: rgba(59, 130, 246, 0.3);
            background-color: rgba(15, 23, 42, 0.6);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Import Map for Dependencies -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@19?dev",
            "react-dom": "https://esm.sh/react-dom@19?dev",
            "react-dom/client": "https://esm.sh/react-dom@19/client?dev",
            "framer-motion": "https://esm.sh/framer-motion@11",
            "lucide-react": "https://esm.sh/lucide-react@0.460.0",
            "firebase/app": "https://esm.sh/firebase@11/app",
            "firebase/auth": "https://esm.sh/firebase@11/auth",
            "firebase/firestore": "https://esm.sh/firebase@11/firestore",
            "three": "https://esm.sh/three@0.170.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9"
        }
    }
    </script>

    <script type="module">
        import React, { useState, useEffect, Suspense } from 'react';
        import ReactDOM from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import * as Lucide from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from 'firebase/auth';
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from 'firebase/firestore';
        import { Canvas } from '@react-three/fiber';
        import { OrbitControls, Stage, useGLTF, PresentationControls, Environment, ContactShadows } from '@react-three/drei';

        // --- Firebase Config ---
        const firebaseConfig = {
            projectId: "gen-lang-client-0470000751",
            appId: "1:211318264202:web:a78a05f010aa3d94467873",
            apiKey: "AIzaSyBZ5t14xda5UEM4G0_LJwpuHsRf5ECB-t4",
            authDomain: "gen-lang-client-0470000751.firebaseapp.com",
            firestoreDatabaseId: "ai-studio-5901bf0f-b410-43ef-9483-ea49bd7013f7",
            storageBucket: "gen-lang-client-0470000751.firebasestorage.app",
            messagingSenderId: "211318264202"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // --- 3D Model Component ---
        function Model({ url }) {
            const { scene } = useGLTF(url);
            return React.createElement('primitive', { object: scene });
        }

        function ModelViewer({ url }) {
            return React.createElement('div', { className: "w-full h-[400px] bg-slate-950/50 rounded-2xl overflow-hidden relative border border-slate-800" },
                React.createElement(Suspense, { fallback: React.createElement('div', { className: "absolute inset-0 flex items-center justify-center text-xs font-mono text-slate-500 uppercase tracking-widest animate-pulse" }, "Loading 3D Engine...") },
                    React.createElement(Canvas, { shadows: true, camera: { position: [0, 0, 4], fov: 45 } },
                        React.createElement(Environment, { preset: "city" }),
                        React.createElement(PresentationControls, {
                            global: true,
                            config: { mass: 2, tension: 500 },
                            snap: { mass: 4, tension: 1500 },
                            rotation: [0, 0.3, 0],
                            polar: [-Math.PI / 3, Math.PI / 3],
                            azimuth: [-Math.PI / 1.4, Math.PI / 1.4]
                        },
                            React.createElement(Stage, { environment: "city", intensity: 0.5, contactShadow: true, adjustCamera: true },
                                React.createElement(Model, { url: url })
                            )
                        ),
                        React.createElement(OrbitControls, { makeDefault: true, enableZoom: false, autoRotate: true, autoRotateSpeed: 0.5 }),
                        React.createElement(ContactShadows, { position: [0, -0.8, 0], opacity: 0.4, scale: 5, blur: 2 })
                    )
                )
            );
        }

        // --- Main App Component ---
        const SERVICES = [
            { title: "Архитектурная визуализация", desc: "Фотореалистичные рендеры для жилых и коммерческих проектов.", icon: Lucide.Shapes },
            { title: "Виртуальный стейджинг", desc: "Дизайн освещения и расстановка мебели для интерьерных концептов.", icon: Lucide.Layers },
            { title: "3D Моделирование продуктов", desc: "Высокоточные цифровые копии продуктов для маркетинга.", icon: Lucide.Box }
        ];

        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const [user, setUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [selectedProject, setSelectedProject] = useState(null);
            const [form, setForm] = useState({
                title: "",
                category: "INTERIOR",
                imageUrl: "",
                modelUrl: "",
                description: "",
                year: "2024"
            });

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener("scroll", handleScroll);
                const unsubscribeAuth = onAuthStateChanged(auth, (u) => setUser(u));
                
                const q = query(collection(db, "projects"), orderBy("createdAt", "desc"));
                const unsubscribeProjects = onSnapshot(q, (snapshot) => {
                    const fetched = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProjects(fetched);
                }, (error) => console.log("Firebase error:", error));

                return () => {
                    window.removeEventListener("scroll", handleScroll);
                    unsubscribeAuth();
                    unsubscribeProjects();
                };
            }, []);

            const handleAddProject = async (e) => {
                e.preventDefault();
                if (!user) return;
                try {
                    await addDoc(collection(db, "projects"), { ...form, ownerId: user.uid, createdAt: serverTimestamp() });
                    setIsAddModalOpen(false);
                    setForm({ title: "", category: "INTERIOR", imageUrl: "", modelUrl: "", description: "", year: "2024" });
                } catch (e) { alert("Ошибка при добавлении"); }
            };

            return React.createElement('div', { className: "min-h-screen font-sans bg-slate-950 relative overflow-hidden" },
                // Background
                React.createElement('div', { className: "absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none" }),
                React.createElement('div', { className: "absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-purple-600/10 rounded-full blur-[100px] pointer-events-none" }),

                // Navigation
                React.createElement('nav', { className: `fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? "glass py-4" : "py-8"}` },
                    React.createElement('div', { className: "max-w-7xl mx-auto px-6 flex justify-between items-center" },
                        React.createElement('div', { className: "flex items-center gap-2 group cursor-pointer", onClick: () => window.scrollTo({top: 0, behavior: 'smooth'}) },
                            React.createElement('div', { className: "w-8 h-8 bg-gradient-to-tr from-blue-500 to-cyan-400 rounded-lg group-hover:rotate-12 transition-transform shadow-lg shadow-blue-500/20" }),
                            React.createElement('span', { className: "text-xl font-bold tracking-tight uppercase" }, 
                                "Vertex", React.createElement('span', { className: "text-blue-400" }, "Viz")
                            )
                        ),
                        React.createElement('div', { className: "hidden md:flex items-center gap-10 text-sm font-medium text-slate-400" },
                            React.createElement('a', { href: "#work", className: "hover:text-blue-400 transition-colors" }, "Портфолио"),
                            React.createElement('a', { href: "#services", className: "hover:text-blue-400 transition-colors" }, "Услуги"),
                            user ? React.createElement('div', { className: "flex items-center gap-4" },
                                React.createElement('button', { onClick: () => setIsAddModalOpen(true), className: "flex items-center gap-2 px-4 py-2 bg-blue-600/10 text-blue-400 border border-blue-600/20 rounded-full" },
                                    React.createElement(Lucide.Plus, { className: "w-4 h-4" }), " Добавить"
                                ),
                                React.createElement('div', { className: "flex items-center gap-2 text-slate-300 border-l border-slate-800 pl-4" },
                                    React.createElement('img', { src: user.photoURL || "", className: "w-6 h-6 rounded-full", alt: "" }),
                                    React.createElement('button', { onClick: () => signOut(auth), className: "hover:text-red-400" }, React.createElement(Lucide.LogOut, { className: "w-4 h-4" }))
                                )
                            ) : React.createElement('button', { onClick: () => signInWithPopup(auth, googleProvider), className: "px-6 py-2.5 bg-white text-slate-950 rounded-full font-bold" }, "Войти")
                        ),
                        React.createElement('button', { className: "md:hidden p-2 text-slate-400", onClick: () => setIsMenuOpen(true) }, 
                            React.createElement(Lucide.Menu, { className: "w-6 h-6" })
                        )
                    )
                ),

                // Hero
                React.createElement('main', { className: "relative z-10" },
                    React.createElement('section', { className: "min-h-screen flex items-center px-6 pt-20" },
                         React.createElement('div', { className: "max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-12 items-center text-left" },
                            React.createElement('div', { className: "lg:col-span-5 space-y-8" },
                                React.createElement(motion.div, { initial: { opacity: 0, x: -20 }, animate: { opacity: 1, x: 0 }, transition: { duration: 0.6 } },
                                    React.createElement('div', { className: "inline-flex items-center gap-2 px-3 py-1 bg-blue-500/10 border border-blue-500/20 rounded-full mb-6" },
                                        React.createElement('span', { className: "w-2 h-2 bg-blue-400 rounded-full animate-pulse" }),
                                        React.createElement('span', { className: "text-[10px] font-bold text-blue-400 uppercase tracking-widest" }, "Доступен для новых проектов")
                                    ),
                                    React.createElement('h1', { className: "text-6xl md:text-7xl font-extrabold leading-tight tracking-tight mb-6" },
                                        "Превращаю ", React.createElement('span', { className: "text-gradient" }, "чертежи"), " в реальность"
                                    ),
                                    React.createElement('p', { className: "text-slate-400 text-lg leading-relaxed max-w-md mb-10" },
                                        "Профессиональная 3D визуализация экстерьеров и интерьеров. Фотореализм, который продает ваши архитектурные идеи."
                                    ),
                                    React.createElement('div', { className: "flex items-center gap-4" },
                                        React.createElement('a', { href: "#work", className: "flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold text-center" }, "Смотреть работы"),
                                        React.createElement('button', { className: "w-14 h-14 bg-slate-900 border border-slate-800 rounded-2xl flex items-center justify-center" }, React.createElement(Lucide.ExternalLink, { className: "w-5 h-5 text-slate-400" }))
                                    )
                                )
                            ),
                            React.createElement('div', { className: "lg:col-span-7 hidden lg:grid grid-cols-2 grid-rows-2 gap-6 h-[600px]" },
                                projects.slice(0, 4).map((p, idx) => 
                                    React.createElement(motion.div, { key: p.id, className: "relative group overflow-hidden rounded-3xl bg-slate-900 border border-slate-800 cursor-pointer", onClick: () => setSelectedProject(p) },
                                        React.createElement('div', { className: "absolute inset-0 bg-gradient-to-t from-slate-950/80 to-transparent z-10" }),
                                        React.createElement('img', { src: p.imageUrl, className: "w-full h-full object-cover grayscale opacity-60 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-700" }),
                                        React.createElement('div', { className: "absolute bottom-0 left-0 p-6 z-20" },
                                            React.createElement('div', { className: "text-[10px] text-blue-400 font-bold uppercase mb-1 tracking-widest" }, p.category),
                                            React.createElement('div', { className: "text-lg font-bold" }, p.title)
                                        )
                                    )
                                )
                            )
                         )
                    ),

                    // Portfolio
                    React.createElement('section', { id: "work", className: "py-32 px-6 max-w-7xl mx-auto" },
                        React.createElement('h2', { className: "text-5xl font-extrabold tracking-tight underline decoration-blue-500/30 decoration-4 underline-offset-8 uppercase mb-16" }, "Портфолио"),
                        React.createElement('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-10" },
                            projects.map((p) => 
                                React.createElement('div', { key: p.id, className: "group relative cursor-pointer", onClick: () => setSelectedProject(p) },
                                    React.createElement('div', { className: "aspect-[16/10] overflow-hidden rounded-[2rem] bg-slate-900 border border-slate-800 relative card-hover" },
                                        React.createElement('div', { className: "absolute inset-0 bg-gradient-to-t from-slate-950/90 via-slate-950/20 to-transparent opacity-80 z-10" }),
                                        React.createElement('img', { src: p.imageUrl, className: "w-full h-full object-cover grayscale brightness-75 group-hover:grayscale-0 group-hover:scale-105 transition-all duration-700" }),
                                        React.createElement('div', { className: "absolute bottom-8 left-8 z-20" },
                                            React.createElement('div', { className: "flex items-center gap-3 mb-2" },
                                                React.createElement('span', { className: "text-[10px] font-bold bg-blue-500/20 border border-blue-500/30 px-2 py-0.5 rounded-lg text-blue-400 uppercase" }, p.category),
                                                React.createElement('span', { className: "text-[10px] font-bold text-slate-500 uppercase" }, p.year)
                                            ),
                                            React.createElement('h3', { className: "text-2xl font-extrabold tracking-tight flex items-center gap-3" }, 
                                                p.title, p.modelUrl && React.createElement(Lucide.Box, { className: "w-5 h-5 text-blue-400" })
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    )
                ),

                // Modal for Add
                isAddModalOpen && React.createElement('div', { className: "fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950/80" },
                    React.createElement('div', { className: "relative w-full max-w-xl bg-slate-900 rounded-[2.5rem] border border-slate-800 p-12" },
                        React.createElement('h3', { className: "text-3xl font-extrabold mb-8 uppercase" }, "Новый проект"),
                        React.createElement('form', { onSubmit: handleAddProject, className: "space-y-6" },
                            React.createElement('input', { required: true, value: form.title, onChange: e => setForm({...form, title: e.target.value}), className: "w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3", placeholder: "Название" }),
                            React.createElement('input', { required: true, value: form.imageUrl, onChange: e => setForm({...form, imageUrl: e.target.value}), className: "w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm", placeholder: "Ссылка на изображение (https://...)" }),
                            React.createElement('input', { value: form.modelUrl, onChange: e => setForm({...form, modelUrl: e.target.value}), className: "w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm", placeholder: "3D модель .glb (https://...)" }),
                            React.createElement('textarea', { value: form.description, onChange: e => setForm({...form, description: e.target.value}), className: "w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3", placeholder: "Описание" }),
                            React.createElement('button', { type: "submit", className: "w-full py-5 bg-blue-600 text-white font-bold rounded-2xl" }, "ОПУБЛИКОВАТЬ")
                        ),
                        React.createElement('button', { className: "absolute top-8 right-8", onClick: () => setIsAddModalOpen(false) }, React.createElement(Lucide.X, { className: "w-6 h-6 text-slate-500" }))
                    )
                ),

                // Modal for Details
                selectedProject && React.createElement('div', { className: "fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950/90" },
                    React.createElement('div', { className: "relative w-full max-w-6xl bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden flex flex-col lg:flex-row max-h-[90vh]" },
                        React.createElement('div', { className: "w-full lg:w-2/3 bg-slate-950 p-4 min-h-[400px]" },
                            selectedProject.modelUrl ? React.createElement(ModelViewer, { url: selectedProject.modelUrl }) : React.createElement('img', { src: selectedProject.imageUrl, className: "w-full h-full object-cover rounded-2xl" })
                        ),
                        React.createElement('div', { className: "w-full lg:w-1/3 p-12 text-left" },
                            React.createElement('h2', { className: "text-4xl font-extrabold mb-6" }, selectedProject.title),
                            React.createElement('p', { className: "text-slate-400 mb-8" }, selectedProject.description),
                            React.createElement('button', { className: "w-full py-4 bg-slate-800 rounded-xl font-bold", onClick: () => setSelectedProject(null) }, "ЗАКРЫТЬ")
                        ),
                        React.createElement('button', { className: "absolute top-6 right-6", onClick: () => setSelectedProject(null) }, React.createElement(Lucide.X, { className: "w-6 h-6 text-slate-500" }))
                    )
                ),

                // Footer
                React.createElement('footer', { className: "py-12 border-t border-slate-900 px-6 text-center" },
                    React.createElement('div', { className: "text-[10px] font-bold text-slate-500 tracking-widest uppercase" }, `© 2024 VERTEX VIZ STUDIO`)
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
