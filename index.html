<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER | Architectural Visualization & VR</title>
    
    <meta name="description" content="Exclusive 3D architectural visualization and immersive VR experiences.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 stroke=%22white%22 stroke-width=%222%22 fill=%22none%22/><path d=%22M30 50 L70 50 M50 30 L50 70%22 stroke=%22white%22 stroke-width=%222%22/></svg>">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (v3 CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#000000',
                        accent: '#ffffff',
                        muted: '#404040',
                        silver: '#a3a3a3',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    
    <style>
        :root {
            --bg: #000000;
            --foreground: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--foreground);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            margin: 0;
            cursor: default;
        }

        /* Recipe 4: Dark Luxury Elements */
        .luxury-line {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            width: 100%;
        }

        .text-huge {
            font-size: clamp(3rem, 15vw, 12rem);
            line-height: 0.85;
            letter-spacing: -0.04em;
            font-weight: 200;
        }

        .glass {
            backdrop-filter: blur(20px);
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .vertical-rail {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0.4;
        }

        .oval-mask {
            clip-path: ellipse(50% 50% at 50% 50%);
        }

        /* Scroll Progress */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: #ffffff;
            transform-origin: 0%;
            z-index: 100;
        }

        canvas {
            touch-action: none;
        }

        ::selection {
            background: #ffffff;
            color: #000000;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Import Map for CDNs -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18",
            "react-dom": "https://esm.sh/react-dom@18",
            "react-dom/client": "https://esm.sh/react-dom@18/client",
            "framer-motion": "https://esm.sh/framer-motion@11",
            "lucide-react": "https://esm.sh/lucide-react@0.460.0",
            "firebase/app": "https://esm.sh/firebase@11/app",
            "firebase/auth": "https://esm.sh/firebase@11/auth",
            "firebase/firestore": "https://esm.sh/firebase@11/firestore",
            "three": "https://esm.sh/three@0.170.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9"
        }
    }
    </script>

    <script type="module">
        import React, { useState, useEffect, useRef, Suspense } from 'react';
        import ReactDOM from 'react-dom/client';
        import { motion, AnimatePresence, useScroll, useSpring } from 'framer-motion';
        import * as Lucide from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from 'firebase/auth';
        import { 
            initializeFirestore, collection, addDoc, onSnapshot, query, 
            orderBy, serverTimestamp, doc, getDocFromServer 
        } from 'firebase/firestore';
        import { Canvas, useFrame } from '@react-three/fiber';
        import { OrbitControls, Stage, useGLTF, PresentationControls, Environment, ContactShadows, useProgress, Float } from '@react-three/drei';

        // --- Firebase Config (Maintained) ---
        const firebaseConfig = {
            projectId: "gen-lang-client-0470000751",
            appId: "1:211318264202:web:a78a05f010aa3d94467873",
            apiKey: "AIzaSyBZ5t14xda5UEM4G0_LJwpuHsRf5ECB-t4",
            authDomain: "gen-lang-client-0470000751.firebaseapp.com",
            firestoreDatabaseId: "ai-studio-5901bf0f-b410-43ef-9483-ea49bd7013f7",
            storageBucket: "gen-lang-client-0470000751.firebasestorage.app",
            messagingSenderId: "211318264202"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true }, firebaseConfig.firestoreDatabaseId);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const h = React.createElement;

        // --- 3D Model Helpers ---
        function Model({ url }) {
            const { scene } = useGLTF(url);
            return h('primitive', { object: scene });
        }

        function LoaderOverlay() {
            const { progress, active } = useProgress();
            if (!active && progress === 100) return null;
            return h(motion.div, {
                className: "absolute inset-0 flex flex-col items-center justify-center bg-black/90 backdrop-blur-3xl z-[60]",
                initial: { opacity: 0 },
                animate: { opacity: 1 }
            }, 
                h('div', { className: "w-40 h-[1px] bg-white/10 mb-4 overflow-hidden" },
                    h(motion.div, { 
                        className: "h-full bg-white",
                        animate: { width: `${progress}%` }
                    })
                ),
                h('div', { className: "text-[8px] font-mono text-white/40 uppercase tracking-[0.5em]" }, `Allocating Geometry... ${Math.round(progress)}%`)
            );
        }

        function ModelViewer({ url }) {
            return h('div', { className: "w-full h-full min-h-[400px] relative bg-black" },
                h(Suspense, { fallback: null },
                    h(LoaderOverlay),
                    h(Canvas, { shadows: true, camera: { position: [0, 0, 5], fov: 35 } },
                        h(Environment, { preset: "studio" }),
                        h(PresentationControls, {
                            global: true,
                            config: { mass: 2, tension: 500 },
                            rotation: [0, 0.3, 0],
                            polar: [-Math.PI / 3, Math.PI / 3],
                        },
                            h(Float, { speed: 2, rotationIntensity: 0.5, floatIntensity: 0.5 },
                                h(Stage, { environment: "studio", intensity: 0.5, contactShadow: true, adjustCamera: true },
                                    h(Model, { url: url })
                                )
                            )
                        ),
                        h(OrbitControls, { makeDefault: true, enableZoom: false, autoRotation: true }),
                        h(ContactShadows, { position: [0, -1, 0], opacity: 0.5, scale: 10, blur: 2 })
                    )
                )
            );
        }

        // --- Comp: Interactive Cursor ---
        function CustomCursor() {
            const [pos, setPos] = useState({ x: 0, y: 0 });
            useEffect(() => {
                const move = (e) => setPos({ x: e.clientX, y: e.clientY });
                window.addEventListener('mousemove', move);
                return () => window.removeEventListener('mousemove', move);
            }, []);
            return h(motion.div, {
                className: "fixed top-0 left-0 w-8 h-8 rounded-full border border-white/20 pointer-events-none z-[9999] hidden md:block",
                animate: { x: pos.x - 16, y: pos.y - 16 },
                transition: { type: 'spring', damping: 25, stiffness: 250 }
            });
        }

        function App() {
            const { scrollYProgress } = useScroll();
            const scaleX = useSpring(scrollYProgress, { stiffness: 100, damping: 30, restDelta: 0.001 });
            
            const [scrolled, setScrolled] = useState(false);
            const [user, setUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [selectedProject, setSelectedProject] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [form, setForm] = useState({ title: "", category: "ARCHITECTURE", imageUrl: "", modelUrl: "", description: "", year: "2024" });

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener("scroll", handleScroll);
                const unsubscribeAuth = onAuthStateChanged(auth, (u) => setUser(u));
                const q = query(collection(db, "projects"), orderBy("createdAt", "desc"));
                const unsubscribeProjects = onSnapshot(q, (snapshot) => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => {
                    window.removeEventListener("scroll", handleScroll);
                    unsubscribeAuth();
                    unsubscribeProjects();
                };
            }, []);

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 1000000) return alert("Файл слишком велик (>1MB)");
                const reader = new FileReader();
                reader.onload = (ev) => setForm(p => ({ ...p, modelUrl: ev.target.result }));
                reader.readAsDataURL(file);
            };

            const handleAddProject = async (e) => {
                e.preventDefault();
                if (!user || uploading) return;
                setUploading(true);
                try {
                    await addDoc(collection(db, "projects"), { ...form, ownerId: user.uid, createdAt: serverTimestamp() });
                    setIsAddModalOpen(false);
                    setForm({ title: "", category: "ARCHITECTURE", imageUrl: "", modelUrl: "", description: "", year: "2024" });
                } catch (err) { alert(err.message); }
                setUploading(false);
            };

            return h('div', { className: "bg-black min-h-screen text-white select-none selection:bg-white selection:text-black" },
                h(motion.div, { className: "progress-bar", style: { scaleX } }),
                h(CustomCursor),

                // Navigation
                h('nav', { className: `fixed top-0 w-full z-[100] transition-colors duration-700 ${scrolled ? 'bg-black/80 backdrop-blur-xl border-b border-white/5' : ''}` },
                    h('div', { className: "max-w-screen-2xl mx-auto px-8 h-20 flex justify-between items-center" },
                        h('div', { className: "flex items-center gap-12" },
                            h('span', { className: "text-xs font-bold tracking-[0.5em] uppercase hover:opacity-100 opacity-60 transition-opacity cursor-pointer" }, "AETHER"),
                            h('div', { className: "hidden md:flex gap-8 text-[10px] font-bold tracking-widest uppercase text-white/40" },
                                h('a', { href: "#works", className: "hover:text-white transition-colors" }, "Archive"),
                                h('a', { href: "#about", className: "hover:text-white transition-colors" }, "Manifesto")
                            )
                        ),
                        h('div', { className: "flex items-center gap-6" },
                            user ? h('div', { className: "flex items-center gap-4" },
                                h('button', { onClick: () => setIsAddModalOpen(true), className: "text-[10px] font-bold tracking-widest border border-white/20 rounded-full px-5 py-2 hover:bg-white hover:text-black transition-all" }, "CURate"),
                                h('button', { onClick: () => signOut(auth) }, h(Lucide.LogOut, { size: 14, className: "text-white/40 hover:text-white" }))
                            ) : h('button', { onClick: () => signInWithPopup(auth, googleProvider), className: "text-[10px] font-bold tracking-widest text-white/40 hover:text-white" }, "Access")
                        )
                    )
                ),

                // Hero Section
                h('header', { className: "h-screen flex items-center justify-center px-8 relative overflow-hidden" },
                    h(motion.div, { 
                        initial: { opacity: 0, y: 100 }, 
                        animate: { opacity: 1, y: 0 }, 
                        transition: { duration: 1, ease: [0.22, 1, 0.36, 1] },
                        className: "text-center relative z-10" 
                    },
                        h('div', { className: "text-[10px] font-bold tracking-[0.8em] uppercase text-white/40 mb-12" }, "Architectural Visualist"),
                        h('h1', { className: "text-huge font-extralight italic serif mb-12" }, "Synthetica"),
                        h('p', { className: "max-w-lg mx-auto text-sm text-white/40 leading-relaxed font-light tracking-wide italic" }, 
                            "Blending structural precision with atmospheric artistry. We create digital twins of unbuilt realities."
                        )
                    ),
                    h('div', { className: "absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center gap-4 opacity-20" },
                        h('div', { className: "w-[1px] h-20 bg-white" }),
                        h('span', { className: "text-[8px] font-bold tracking-widest uppercase" }, "Scroll")
                    )
                ),

                // Portfolio Archive
                h('section', { id: "works", className: "py-40 px-8" },
                    h('div', { className: "max-w-screen-2xl mx-auto" },
                        h('div', { className: "flex items-end justify-between mb-32 border-b border-white/10 pb-12" },
                            h('div', null,
                                h('div', { className: "text-[10px] font-bold tracking-widest text-white/40 uppercase mb-4" }, "01 / Index"),
                                h('h2', { className: "text-6xl font-light italic serif" }, "Archive")
                            ),
                            h('div', { className: "text-[10px] font-mono text-white/40" }, projects.length + " SELECTED WORKS")
                        ),
                        
                        h('div', { className: "grid grid-cols-1 gap-40" },
                            projects.map((p, idx) => h(motion.div, { 
                                key: p.id,
                                initial: { opacity: 0, y: 50 },
                                whileInView: { opacity: 1, y: 0 },
                                viewport: { once: true },
                                className: "group relative grid grid-cols-1 lg:grid-cols-12 gap-12 items-center"
                            },
                                h('div', { className: `lg:col-span-7 ${idx % 2 === 0 ? '' : 'lg:order-2'}` }, 
                                    h('div', { 
                                        className: "aspect-[16/10] overflow-hidden bg-white/5 relative cursor-pointer",
                                        onClick: () => setSelectedProject(p)
                                    },
                                        h('img', { 
                                            src: p.imageUrl, 
                                            className: "w-full h-full object-cover transition-transform duration-[2s] group-hover:scale-105" 
                                        }),
                                        h('div', { className: "absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-sm" },
                                            h('div', { className: "border border-white/40 rounded-full w-20 h-20 flex items-center justify-center text-[10px] tracking-widest font-bold uppercase" }, "VIEW")
                                        )
                                    )
                                ),
                                h('div', { className: `lg:col-span-5 text-left ${idx % 2 === 0 ? '' : 'lg:order-1 lg:text-right'}` },
                                    h('div', { className: "text-[8px] font-bold tracking-widest text-white/40 uppercase mb-8" }, p.category + " — " + p.year),
                                    h('h3', { className: "text-5xl font-light italic serif mb-8 leading-tight" }, p.title),
                                    h('p', { className: "text-white/40 text-sm leading-relaxed font-light mb-12 max-w-sm ml-auto mr-auto lg:mr-0 inline-block" }, p.description),
                                    h('button', { 
                                        onClick: () => setSelectedProject(p),
                                        className: "block text-[10px] font-bold tracking-widest uppercase hover:underline underline-offset-8" 
                                    }, "Deep Dive →")
                                )
                            ))
                        )
                    )
                ),

                // Manifest Section
                h('section', { id: "about", className: "py-40 bg-white text-black" },
                    h('div', { className: "max-w-screen-xl mx-auto px-8" },
                        h('div', { className: "grid grid-cols-1 lg:grid-cols-2 gap-20 items-center" },
                            h('div', { className: "luxury-line lg:hidden" }),
                            h('h2', { className: "text-huge serif italic font-thin" }, "Lux"),
                            h('div', { className: "space-y-12" },
                                h('h4', { className: "text-2xl font-light leading-relaxed italic" }, 
                                    "We believe that every architectural project deserves a narrative. Light is our ink, and the void is our canvas."
                                ),
                                h('p', { className: "text-sm text-black/60 leading-[2] font-light" }, 
                                    "Our studio operates at the intersection of high-end photography and parametric design. By utilizing advanced path-tracing technologies and custom shader workflows, we bridge the gap between imagination and perception."
                                )
                            )
                        )
                    )
                ),

                // Add Project Modal
                h(AnimatePresence, null, 
                    isAddModalOpen && h('div', { className: "fixed inset-0 z-[200] flex items-center justify-center p-8 bg-black/90 backdrop-blur-xl" },
                        h(motion.div, { initial: { opacity: 0, y: 20 }, animate: { opacity: 1, y: 0 }, exit: { opacity: 0 }, className: "w-full max-w-lg bg-white text-black rounded-lg p-12 relative" },
                            h('button', { className: "absolute top-8 right-8 text-black/20 hover:text-black", onClick: () => setIsAddModalOpen(false) }, h(Lucide.X, { size: 24 })),
                            h('div', { className: "text-[10px] font-bold tracking-[0.5em] uppercase text-black/40 mb-10 text-center" }, "New Curator Entry"),
                            h('form', { onSubmit: handleAddProject, className: "flex flex-col gap-8 text-left" },
                                h('div', { className: "space-y-2" },
                                    h('label', { className: "text-[8px] font-bold uppercase tracking-widest text-black/40" }, "Subject Name"),
                                    h('input', { required: true, className: "w-full border-b border-black/10 py-2 outline-none focus:border-black transition-colors" }, { value: form.title, onChange: e => setForm({...form, title: e.target.value}) }),
                                ),
                                h('div', { className: "space-y-2" },
                                    h('label', { className: "text-[8px] font-bold uppercase tracking-widest text-black/40" }, "Visual Asset (URL)"),
                                    h('input', { required: true, className: "w-full border-b border-black/10 py-2 outline-none focus:border-black text-xs" }, { value: form.imageUrl, onChange: e => setForm({...form, imageUrl: e.target.value}) }),
                                ),
                                h('div', { className: "flex flex-col gap-4" },
                                    h('label', { className: "text-[8px] font-bold uppercase tracking-widest text-black/40" }, "3D Coordinate (.glb)"),
                                    h('input', { type: "file", accept: ".glb", onChange: handleFileChange, className: "text-[10px] file:bg-black file:text-white file:border-0 file:py-2 file:px-6 file:rounded-full cursor-pointer" }),
                                ),
                                h('textarea', { className: "w-full border border-black/10 p-4 rounded-lg min-h-[100px] outline-none text-sm", placeholder: "Narrative description...", value: form.description, onChange: e => setForm({...form, description: e.target.value}) }),
                                h('button', { type: "submit", disabled: uploading, className: "w-full py-5 bg-black text-white font-bold tracking-[0.3em] uppercase hover:opacity-90 disabled:opacity-30" }, uploading ? "Encrypting..." : "Publish to Void")
                            )
                        )
                    )
                ),

                // Project Details Modal
                h(AnimatePresence, null,
                    selectedProject && h('div', { className: "fixed inset-0 z-[200] bg-black/95 backdrop-blur-2xl flex flex-col md:flex-row overflow-hidden" },
                        h(motion.div, { initial: { opacity: 0 }, animate: { opacity: 1 }, className: "w-full md:w-3/5 h-[50vh] md:h-full relative" },
                            selectedProject.modelUrl ? h(ModelViewer, { url: selectedProject.modelUrl }) : h('img', { src: selectedProject.imageUrl, className: "w-full h-full object-cover" }),
                        ),
                        h(motion.div, { 
                            initial: { x: '100%' }, 
                            animate: { x: 0 }, 
                            exit: { x: '100%' },
                            transition: { type: 'spring', damping: 40, stiffness: 400 },
                            className: "w-full md:w-2/5 p-12 md:p-24 flex flex-col justify-center gap-12 bg-black border-l border-white/5 overflow-y-auto" 
                        },
                            h('div', null,
                                h('div', { className: "text-[10px] font-bold tracking-[0.5em] uppercase text-white/40 mb-8" }, selectedProject.category + " — " + selectedProject.year),
                                h('h2', { className: "text-6xl font-light serif italic mb-8" }, selectedProject.title),
                                h('div', { className: "w-20 h-[1px] bg-white/20" })
                            ),
                            h('p', { className: "text-sm text-white/40 leading-loose font-light max-w-sm" }, selectedProject.description || "The spatial narrative for this entity remains classified."),
                            h('div', { className: "flex gap-6" },
                                h('button', { onClick: () => setSelectedProject(null), className: "px-10 py-5 border border-white/20 rounded-full text-[10px] font-bold tracking-widest uppercase hover:bg-white hover:text-black transition-all" }, "Return to Index")
                            )
                        ),
                        h('button', { className: "absolute top-8 right-8 z-[210] p-4 bg-white/5 rounded-full hover:bg-white/10", onClick: () => setSelectedProject(null) }, h(Lucide.X, { size: 24 }))
                    )
                ),

                // Footer
                h('footer', { className: "py-20 border-t border-white/5 text-center text-[8px] font-bold tracking-[0.8em] text-white/20 uppercase" }, "© 2024 AETHER STUDIO — GENEVA")
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(App));
    </script>
</body>
</html>
